name: Add Meta-Plugin from Issue

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  add-plugin:
    if: |
      contains(github.event.issue.labels.*.name, 'meta-plugin') || 
      startsWith(github.event.issue.title, '[Meta-Plugin]:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse Issue Body
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/meta_plugin_submission.yml

      - name: Debug Parser Outputs
        run: |
          echo "All outputs from parse step:"
          echo '${{ toJson(steps.parse.outputs) }}'

      - name: Update Plugin Lists
        shell: bash
        env:
          ISSUE_JSON: ${{ steps.parse.outputs.data }}
        run: |
          # Use the environment variable which is safer for JSON strings
          NAME=$(echo "$ISSUE_JSON" | jq -r '.plugin_name')
          SERVER=$(echo "$ISSUE_JSON" | jq -r '.server_supported')
          URL=$(echo "$ISSUE_JSON" | jq -r '.source_url')
          DESC=$(echo "$ISSUE_JSON" | jq -r '.description')
          
          # Check if we got the data
          if [ -z "$NAME" ] || [ "$NAME" == "null" ]; then
            echo "Error: Could not parse issue data."
            exit 1
          fi
          
          # Extract owner from GitHub URL
          if [[ $URL =~ github\.com/([^/]+)/ ]]; then
            OWNER="${BASH_REMATCH[1]}"
          else
            OWNER="Unknown"
          fi
          
          # Prepare the table row
          ROW="| [$NAME]($URL) | \`$SERVER\` | [$OWNER](https://github.com/$OWNER) | [GitHub]($URL) | $DESC |"
          
          # Update English list
          sed -i "/<!-- META_PLUGIN_LIST_END -->/i $ROW" docs/guide/meta-plugin-list.md
          
          # Update Chinese list
          sed -i "/<!-- META_PLUGIN_LIST_END -->/i $ROW" docs/zh/guide/meta-plugin-list.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add meta-plugin"
          title: "Add Meta-Plugin"
          body: |
            This PR adds a new Meta-Plugin to the documentation based on issue #${{ github.event.issue.number }}.
          branch: "add-meta-plugin-${{ github.event.issue.number }}"
          labels: "meta-plugin"
