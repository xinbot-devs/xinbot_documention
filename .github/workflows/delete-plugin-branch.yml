name: Delete Plugin Branch on Close

# Auto-generated add-plugin branches are disposable: clean them up whenever
# their PR is closed, merged or not.
on:
  pull_request:
    types: [closed]

jobs:
  delete-branch:
    if: (startsWith(github.event.pull_request.head.ref, 'add-plugin-') || startsWith(github.event.pull_request.head.ref, 'add-meta-plugin-'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete branch
        run: |
          gh api -X DELETE /repos/${{ github.repository }}/git/refs/heads/${{ github.event.pull_request.head.ref }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
