name: Update Version from Xinbot Release

on:
  repository_dispatch:
    types: [update_version]

# Serialize runs so two releases in quick succession don't race on the push
concurrency:
  group: update-version
  cancel-in-progress: false

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update version.json
        env:
          VERSION: ${{ github.event.client_payload.version }}
          DOWNLOAD_URL: ${{ github.event.client_payload.download_url }}
          RELEASE_URL: ${{ github.event.client_payload.release_url }}
        run: |
          # Generate version.json with jq so payload values always produce valid JSON
          jq -n \
            --arg latest_version "$VERSION" \
            --arg download_url "$DOWNLOAD_URL" \
            --arg release_url "$RELEASE_URL" \
            --arg updated_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{latest_version: $latest_version, download_url: $download_url, release_url: $release_url, updated_at: $updated_at}' \
            > docs/public/data/version.json

          echo "Updated version.json to version ${VERSION}"

      - name: Commit and push changes
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/public/data/version.json
          git commit -m "chore: update version to ${VERSION}" || exit 0
          git push
