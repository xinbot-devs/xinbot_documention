name: Meta-Plugin Submission
description: Submit a new Meta-Plugin to the Xinbot documentation list
title: "[Meta-Plugin]: <Plugin Name>"
labels: ["meta-plugin"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing to the Xinbot community! Please fill out the information below so we can add your Meta-Plugin to the list.
  - type: input
    id: plugin_name
    attributes:
      label: Plugin Name
      placeholder: e.g., Super2b2tMeta
    validations:
      required: true
  - type: input
    id: server_supported
    attributes:
      label: Supported Servers
      placeholder: e.g., 2b2t.org
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: Source URL (GitHub)
      placeholder: https://github.com/username/repo
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Briefly describe what this plugin does.
    validations:
      required: true
